services:
  postgres:
    image: postgres:16-alpine
    container_name: queuetable-db
    environment:
      POSTGRES_DB: queuetable
      POSTGRES_USER: queuetable
      POSTGRES_PASSWORD: queuetable
    ports:
      - "5433:5432"
    volumes:
      - queuetable-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queuetable"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  queuetable-data:
